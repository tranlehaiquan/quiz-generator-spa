# For Docker hosts with --icc=false (Oracle Cloud).
# Exposes ports so services can reach each other via host.docker.internal.
services:
  db:
    ports:
      - "5432:5432"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/quizdb

  web:
    extra_hosts:
      - "host.docker.internal:host-gateway"
